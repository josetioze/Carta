<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Universo</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        #carta { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #0f172a; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 999; }
        #menu { display: none; background: #1e293b; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #ff4d6d; }
        button { background: #ff4d6d; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; margin: 5px; font-weight: bold; }
        .pagina { display: none; padding: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .slide { display: none; }
        img, video { width: 90%; max-width: 500px; border-radius: 15px; border: 3px solid #ff4d6d; }
    </style>
</head>
<body>

    <div id="carta">
        <h2>💌 Tenho algo para você...</h2>
        <button onclick="abrirSite()">Abrir ❤️</button>
    </div>

    <div id="menu">
        <button onclick="abrirPagina('historia')">História</button>
        <button onclick="abrirPagina('croche')">Crochê</button>
        <button onclick="abrirPagina('sonho')">Sonhos</button>
    </div>

    <div class="pagina" id="historia">
        <h1>Nossa História ❤️</h1>
        <p>Que sejamos felizes meu cuscuz!</p>
        <div class="slide s1"><img src="w1.jpeg"></div>
        <div class="slide s1"><img src="w2.jpeg"></div>
    </div>

    <div class="pagina" id="croche">
        <h1>Seu Talento 🧶</h1>
        <div class="slide s2"><img src="c1.jpeg"></div>
    </div>

    <div class="pagina" id="sonho">
        <h1>Vamos Sonhar ✨</h1>
    </div>

    <script>
        function abrirSite() {
            document.getElementById("carta").style.display = "none";
            document.getElementById("menu").style.display = "block";
            abrirPagina('historia');
        }

        function abrirPagina(id) {
            let p = document.getElementsByClassName("pagina");
            for (let i = 0; i < p.length; i++) p[i].style.display = "none";
            document.getElementById(id).style.display = "block";
        }

        function rodarSlides(classe) {
            let index = 0;
            setInterval(() => {
                let slides = document.getElementsByClassName(classe);
                if(slides.length > 0) {
                    for(let s of slides) s.style.display = "none";
                    index = (index + 1) % slides.length;
                    slides[index].style.display = "block";
                }
            }, 4000);
        }

        window.onload = () => {
            rodarSlides('s1');
            rodarSlides('s2');
        };
    </script>
</body>
</html>
